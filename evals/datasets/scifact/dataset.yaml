name: scifact
description: >
  BEIR/SciFact — scientific claim verification on PubMed paper abstracts.
  5,183 corpus passages, 300 test queries, binary qrels.

  Generated via:
    curl -L https://public.ukp.informatik.tu-darmstadt.de/thakur/BEIR/datasets/scifact.zip -o /tmp/scifact.zip
    unzip /tmp/scifact.zip -d /tmp/scifact-src/
    uv run python evals/tools/convert_beir.py \
        --source /tmp/scifact-src/scifact/ \
        --out evals/datasets/scifact/ \
        --baseline-bm25-ndcg10 0.665

  ``corpus/`` and ``queries.yaml`` are gitignored — re-run the command
  above to materialise them locally. Published baselines below come from
  the BEIR paper (Thakur et al., 2021, Table 6).

  Note: the converter currently rewrites this file on every run, which
  strips the curated description. See ``evals/BASELINES.md`` for the
  observed numbers and follow-ups.

# Calibrated against the 2026-04-28 chunk-level fusion run with
# Qwen3-Embedding-0.6B (1024-dim native via Gitee AI) under the
# SciFact-tuned RRF defaults (rrf_k=60, bm25_weight=0.3,
# vector_weight=1.5 — see ``src/dikw_core/config.py :: RetrievalConfig``).
# Thresholds leave ~3 % slack below observed hybrid-canonical numbers
# so an honest retrieval regression fails the gate while small
# re-run variance doesn't. These bind when running with
# ``--retrieval hybrid`` (canonical) or ``--retrieval all`` (mirrored
# from hybrid).
#
# Threshold floor was rebased downward from the 2026-04-23 8B-era
# values (hit@3 0.77 / hit@10 0.89 / mrr 0.71 / ndcg@10 0.74 /
# recall@100 0.94) — 0.6B regresses ~0.05–0.10 across position-
# weighted metrics on this specialist-English corpus while CMTEB
# stays flat. The current floor detects 0.6B-class regressions, not
# 8B-quality ones; raise back if a larger model becomes the
# canonical eval target. See ``evals/BASELINES.md`` for the rebase
# rationale and the per-task asymmetry analysis.
thresholds:
  hit_at_3: 0.71
  hit_at_10: 0.82
  mrr: 0.64
  ndcg_at_10: 0.67
  recall_at_100: 0.92

published_baselines:
  source: "BEIR paper (Thakur et al., 2021)"
  bm25_anserini:
    ndcg_at_10: 0.665
  notes: >
    Our bm25 mode reproduced Anserini's nDCG@10 within 0.004 on the
    2026-04-23 run (0.669 observed vs 0.665 published) — FTS5 is
    effectively on-par with Anserini for this dataset once the
    OR-of-tokens sanitizer is applied. Dense retrieval baselines on
    BEIR/SciFact span roughly nDCG@10 0.55-0.75 in the original paper;
    modern strong embedders (Qwen3, BGE-M3, E5-mistral) land above 0.75.
    See evals/BASELINES.md for the full run report.
