queries:
- id: eiffel_doc
  query_type: doc
  q: What is the Eiffel Tower?
  expect_any:
  - eiffel_tower
- id: eiffel_desc
  query_type: text_chunk
  q: Who built the Eiffel Tower and when?
  expect_any:
  - eiffel_tower
  expect_chunk_any:
  - eiffel_tower.description
- id: eiffel_img_asset
  query_type: asset
  q: Find the photograph of the Eiffel Tower
  expect_any:
  - eiffel_tower
  expect_asset_any:
  - eiffel_tower.image
- id: eiffel_img_chunk
  query_type: text_chunk
  q: section that shows the Eiffel Tower image
  expect_any:
  - eiffel_tower
  expect_chunk_any:
  - eiffel_tower.image_chunk
