name: Trivy

on:
  pull_request:
    paths:
      - 'examples/docker/**'
      - 'pyproject.toml'
      - '.github/workflows/trivy.yml'
  push:
    branches: [main]
  schedule:
    # Offset 1h from codeql.yml's weekly schedule.
    - cron: '23 5 * * 1'

jobs:
  scan:
    name: Scan dikw-core image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Build image locally
        run: |
          docker build \
            -t dikw-core:scan \
            -f examples/docker/Dockerfile \
            examples/docker

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: dikw-core:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload SARIF to GitHub Security tab
        # Guard against missing artifact when an upstream step (e.g.
        # docker build) fails before SARIF is written.
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360  # v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy
