name: cmteb-t2-subset
description: "C-MTEB / T2Retrieval — Chinese passage retrieval over a question- answering\
  \ corpus. 118,605 passages, 22,812 queries, ~5.2 positive qrels per query. Unlike\
  \ BEIR/SciFact, **every corpus passage is a positive qrel for at least one query**\
  \ — there are no distractor documents in the upstream corpus. Naive corpus-level\
  \ stratified sampling therefore degenerates (it preserves the relevant set, which\
  \ equals the whole corpus). This subset is produced by query-first sampling + synthetic\
  \ distractor padding.\nSampling procedure (matches SciFact's 300-query slice for\
  \ apples-to- apples comparison on fusion-weight generalisation):\n1. Deterministically\
  \ sample 300 queries (seed=42) from the dev split.\n   T2Retrieval only ships dev\
  \ qrels — no test split exists.\n2. Collect the union of those 300 queries' positive\
  \ pids (~1,582\n   unique docs at seed=42).\n3. Pad with ~3,418 non-relevant pids\
  \ (sampled uniformly with the\n   same RNG) to reach exactly 5,000 corpus docs.\
  \ These \"distractors\"\n   are relevant to OTHER queries in the full dataset but\
  \ are\n   distractors from the perspective of the sampled 300 queries.\n4. Filter\
  \ qrels to rows where both qid ∈ sampled-queries and\n   pid ∈ sampled-corpus.\n\
  \nRegeneration:\n  # 1. Download both sub-repos (corpus+queries + qrels):\n  hf\
  \ download C-MTEB/T2Retrieval --repo-type dataset \\\n      --local-dir /tmp/t2-src/\n\
  \  hf download C-MTEB/T2Retrieval-qrels --repo-type dataset \\\n      --local-dir\
  \ /tmp/t2-qrels/\n  # 2. Parquet → query-first-sampled BEIR bundle:\n  uv run python\
  \ evals/tools/prep_cmteb_t2.py \\\n      --src-dir /tmp/t2-src/ \\\n      --qrels-dir\
  \ /tmp/t2-qrels/ \\\n      --out /tmp/t2-src-sampled/ \\\n      --num-queries 300\
  \ --seed 42 \\\n      --target-size 5000 --split dev\n  # 3. Run the generic converter\
  \ (sample-size 10000 keeps all 5K):\n  uv run python evals/tools/convert_cmteb.py\
  \ \\\n      --source /tmp/t2-src-sampled/ \\\n      --out evals/datasets/cmteb-t2-subset/\
  \ \\\n      --sample-size 10000 --random-seed 42 --qrels-split dev\n\n``corpus/``\
  \ and ``queries.yaml`` are gitignored — re-run the pipeline above to materialise.\
  \ The ``_preprocessing`` block pins the query- sampling parameters; the ``_sampling``\
  \ block pins the (pass-through) converter invariants.\nThresholds: left empty until\
  \ the first real-vector run lands. This subset has denser distractor coverage than\
  \ the full CMTEB test bed (5K vs 118K), so expect higher hit@k than published CMTEB\
  \ leaderboard runs; treat as a calibration floor, not a direct comparison.\nPublished\
  \ baselines: C-MTEB / T2Retrieval leaderboard numbers vary by model and shift over\
  \ time, so this dataset intentionally omits a ``published_baselines`` block. Compare\
  \ observed dikw runs against the latest leaderboard entries at https://huggingface.co/spaces/mteb/leaderboard\
  \ manually — and remember this is a 300-query subset, not the full benchmark.\n"
thresholds:
  hit_at_3: 0.94
  hit_at_10: 0.96
  mrr: 0.93
  ndcg_at_10: 0.92
  recall_at_100: 0.96
_sampling:
  sample_size: 10000
  random_seed: 42
  source_qrels_split: dev
  source_corpus_total: 5000
  relevant_kept: 1582
_preprocessing:
  source_repos:
  - C-MTEB/T2Retrieval
  - C-MTEB/T2Retrieval-qrels
  upstream_corpus_total: 118605
  upstream_queries_total: 22812
  upstream_qrels_split: dev
  query_sample_size: 300
  query_random_seed: 42
  relevant_pids_unique: 1582
  distractor_pids_added: 3418
  target_corpus_size: 5000
