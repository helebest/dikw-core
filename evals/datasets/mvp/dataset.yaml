name: mvp
description: >
  MVP dogfood corpus — three Karpathy essays (LLM-wiki gist,
  Software 2.0, Recipe for Training Neural Networks). 3 in-domain
  queries + 3 out-of-domain negatives.

  Supports two eval modes — ``retrieval`` (the original hermetic gate)
  and ``synth`` (K-layer quality eval added 2026-05-12). Both halves
  carry calibrated thresholds; see ``evals/BASELINES.md`` for the
  observed numbers and rationale behind the slack.

modes: [retrieval, synth]

# Retrieval thresholds: with 3 in-domain queries each result shifts
# hit@k by 0.33 — the gate is intentionally lax (0.80) so a single
# regression flips it but small corpus jitters don't flake.
#
# Synth thresholds calibrated 2026-05-13 against openai_codex (gpt-5.5)
# LLM + Qwen3-Embedding-0.6B@1024 (Gitee). Pre-cleanup baseline was
# 7 sources / 31 pages; post-cleanup (3 Karpathy sources only) will
# re-calibrate on the next baseline run — the floors below should
# still pass since the metrics are corpus-agnostic, but re-record
# observed values into BASELINES.md after the first post-cleanup run.
thresholds:
  hit_at_3: 0.80
  hit_at_10: 0.80
  mrr: 0.60
  synth/fact_grounding_ratio: 0.55
  synth/atomicity_score: 0.85
  synth/duplicate_ratio_max: 0.05
  synth/wikilink_resolved_ratio: 0.55
  synth/language_fidelity: 0.95
  # expected_coverage intentionally NOT gated yet — pre-cleanup runs
  # showed >0.09 noise between two real-LLM passes, and the
  # expected_titles in expected.yaml didn't fuzzy-match the LLM's
  # actual title patterns. Re-add once the fuzzy resolver /
  # expected.yaml are reconciled against a fresh post-cleanup run
  # (see the 2026-05-13 BASELINES.md entry, follow-up #2).

synth:
  # grounding_threshold lowered from 0.65 → 0.50 after the 2026-05-13
  # tau sweep (BASELINES.md). Real-grounded claims cluster at cosine
  # 0.55+; paraphrased / fragment claims at < 0.40. 0.50 is the gap.
  grounding_threshold: 0.50
  duplicate_threshold: 0.85
  page_types: [entity, concept, note]
