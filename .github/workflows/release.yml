name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # required for PyPI trusted publishing

jobs:
  # Run the exact same gate PRs run before doing anything irreversible.
  # Previously this workflow ran a thin ``ruff + mypy + pytest -q``
  # gate, which missed the Postgres contract suite, the slow serve-and-
  # run e2e, and the wheel install smoke test — v0.0.2's first PyPI
  # upload was rejected for duplicate wheel entries even though the
  # release gate had passed.
  pre-release-gate:
    uses: ./.github/workflows/reusable-ci.yml

  build:
    name: Build sdist + wheel
    needs: pre-release-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Verify tag matches pyproject version
        run: |
          set -e
          tag_version="${GITHUB_REF_NAME#v}"
          pyproject_version=$(uv run --no-project python -c \
            "import tomllib,sys;print(tomllib.loads(open('pyproject.toml','rb').read().decode())['project']['version'])")
          if [ "$tag_version" != "$pyproject_version" ]; then
            echo "tag $GITHUB_REF_NAME does not match pyproject version $pyproject_version" >&2
            exit 1
          fi

      - name: Build distributions
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (trusted publishing)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dikw-core
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1
